services:
  itemservice:
    build: ./itemservice
    ports:
      - "8081:8081"
    networks:
      - microservices-net
    environment:
      - SERVER_PORT=8081

  orderservice:
    build: ./orderservice
    ports:
      - "8082:8082"
    networks:
      - microservices-net
    environment:
      - SERVER_PORT=8082

  paymentservice:
    build: ./paymentservice
    ports:
      - "8083:8083"
    networks:
      - microservices-net
    environment:
      - SERVER_PORT=8083

  apigateway:
    build: ./apigateway
    ports:
      - "8080:8080"
    networks:
      - microservices-net
    depends_on:
      - itemservice
      - orderservice
      - paymentservice
    environment:
      - SERVER_PORT=8080

networks:
  microservices-net:
    driver: bridge